<body><main class="wrap"><h1>Premium SaaS Architecture</h1><p>Workspace users sign in with Google through Clerk, build metadata-driven sites, upload media to Vercel Blob, sell through Stripe, and publish DB-rendered storefronts with SEO, analytics and custom domains.</p><section class="card"><svg viewBox="0 0 1160 720" role="img" aria-label="SaaS architecture diagram"><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#9a7a22"/></marker></defs>

  <rect class="node" x="90" y="310" width="190" height="76" rx="20"/><text class="txt" x="185" y="354" text-anchor="middle">Gemini APIs</text>
